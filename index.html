<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          });
          var pathname = '/' + decoded[0].slice(2);
          var query = decoded[1] ? '?' + decoded[1].slice(2) : '';
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + pathname + query + l.hash
          );
        }
      }(window.location))
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minh Vo | Data Science &amp; Analytics</title>
